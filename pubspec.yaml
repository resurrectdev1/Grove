name: grove
description: "Visualize your growth."
publish_to: 'none'
version: 0.5.6+3

environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: "3.41.2"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Core Functionality
  provider: ^6.1.2
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  url_launcher: ^6.3.0
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  local_auth: ^2.3.0

  # UI & Theming
  dynamic_color: ^1.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

# Icon Configuration
flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#0A0F0B"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
